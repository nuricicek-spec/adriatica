<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Mobile viewport: zoom enabled (kaldırıldı maximum-scale=1) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adriatica D.O.O. - Marine Engineering & Consultancy</title>
    <meta name="description" content="Adriatica D.O.O. - Marine engineering consultancy specializing in structural integrity, regulatory compliance, and sustainable technologies. Serving Montenegro, Adriatic Coast, and European maritime industry." />
    <meta name="author" content="Adriatica D.O.O." />
    <meta name="robots" content="index, follow" />
    <meta name="geo.region" content="ME" />
    <meta name="geo.placename" content="Montenegro" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ========== 1. LCP İYİLEŞTİRMESİ: Logo'yu preload et ========== -->
    <link rel="preload" as="image" href="/logo.svg" fetchpriority="high" />

    <!-- ========== 2. RENDER-BLOCKING KALDIRMA: Sadece kritik fontları yükle, gerisini async yap ========== -->
    <!-- Kritik fontları önceden bağlan (preconnect) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- SADECE KULLANILAN FONTLAR (Cinzel, Manrope, Montserrat) - Diğer 40+ font kaldırıldı -->
    <!-- Bu CSS render-blocking yapmaz çünkü media="print" ile yüklenip sonra değiştiriliyor -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Manrope:wght@200;300;400;500;600;700;800&family=Montserrat:wght@300;400&display=swap"
          media="print"
          onload="this.media='all'"
          fetchpriority="low" />
    <noscript>
      <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Manrope:wght@200;300;400;500;600;700;800&family=Montserrat:wght@300;400&display=swap" />
    </noscript>

    <!-- ========== 3. KRİTİK CSS (isteğe bağlı, above-the-fold için) ==========
         İleride buraya kritik stilleri inline ekleyebilirsiniz.
         Şimdilik boş. 
    -->
    <style>
      /* Geçici olarak FOUC önlemek için minimal stiller – opsiyonel */
      body { margin: 0; font-family: 'Manrope', sans-serif; }
      img[fetchpriority="high"] { content-visibility: auto; }
    </style>

    <!-- Ana CSS dosyası – kritik değil, async yüklenebilir. 
         Ancak build sonrası asset'lerin hash'i değişir, o yüzden bu satırı olduğu gibi bırakıyorum.
         Build sırasında bu satır otomatik ekleniyorsa sorun yok.
    -->
    <!-- <link rel="stylesheet" href="/assets/index-xxx.css" media="print" onload="this.media='all'"> -->
    <!-- Not: Build sistemi (Vite) bu satırı kendi ekliyorsa, yukarıdaki gibi async yapacak şekilde ayarlamalısınız.
         Aşağıdaki satır örnek amaçlıdır. Gerçek build'de bu satır yoksa eklemenize gerek yok. -->
  </head>
  <body>
    <div id="root"></div>
    <!-- Ana JS dosyası – defer ile yükleniyor (zaten Vite böyle yapar) -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
