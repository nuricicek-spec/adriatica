<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default title & description — react-helmet-async overrides these per page -->
    <title>Adriatica D.O.O. - Marine Engineering & Consultancy</title>
    <meta
      name="description"
      content="Adriatica D.O.O. provides independent marine engineering consultancy, technical project management, and regulatory compliance services for yachts, commercial vessels, and fishing boats."
    />

    <meta name="author" content="Adriatica D.O.O." />
    <meta name="robots" content="index, follow" />
    <meta name="geo.region" content="ME" />
    <meta name="geo.placename" content="Montenegro" />
    <meta name="theme-color" content="#0B3B5C" />

    <!-- Favicon - DÜZELTİLDİ: alternate keyword'ü kaldırıldı -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- LCP görselini önceden yükle -->
    <link rel="preload" as="image" href="/logo.svg" fetchpriority="high">

    <!-- ========== GA4 (SPA — manual page_view in App.tsx) ========== -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-WPWD3K7JHR"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-WPWD3K7JHR", { send_page_view: false });
    </script>

    <!-- Kritik stiller inline — FOUC'u engeller -->
    <style>
      body {
        margin: 0;
        font-family: "Manrope", sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
