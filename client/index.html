<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default title & description — react-helmet-async overrides these per page -->
    <title>Adriatica D.O.O. - Marine Engineering & Consultancy</title>
    <meta name="description" content="Adriatica D.O.O. provides independent marine engineering consultancy, technical project management, and regulatory compliance services for yachts, commercial vessels, and fishing boats." />

    <meta name="author" content="Adriatica D.O.O." />
    <meta name="robots" content="index, follow" />
    <meta name="geo.region" content="ME" />
    <meta name="geo.placename" content="Montenegro" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ========== GA4 (SPA — manual page_view in main.tsx) ========== -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WPWD3K7JHR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WPWD3K7JHR', { send_page_view: false });
    </script>

    <!-- ========== LCP: preload logo ========== -->
    <link rel="preload" as="image" href="/logo.svg" fetchpriority="high" />

    <!-- ========== Font preconnect — crossorigin required on both ========== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Async font load (print→all trick eliminates render-blocking) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Manrope:wght@200;300;400;500;600;700;800&family=Montserrat:wght@300;400&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Manrope:wght@200;300;400;500;600;700;800&family=Montserrat:wght@300;400&display=swap"
      />
    </noscript>

    <!-- Minimal critical CSS — prevents FOUC before Tailwind loads -->
    <style>
      body { margin: 0; font-family: 'Manrope', sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
