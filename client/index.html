<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default title & description — react-helmet-async overrides these per page -->
    <title>Adriatica D.O.O. - Marine Engineering & Consultancy</title>
    <meta
      name="description"
      content="Adriatica D.O.O. provides independent marine engineering consultancy, technical project management, and regulatory compliance services for yachts, commercial vessels, and fishing boats."
    />

    <meta name="author" content="Adriatica D.O.O." />
    <meta name="robots" content="index, follow" />
    <meta name="geo.region" content="ME" />
    <meta name="geo.placename" content="Montenegro" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ========== GA4 (SPA — manual page_view in App.tsx) ========== -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-WPWD3K7JHR"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-WPWD3K7JHR", { send_page_view: false });
    </script>

    <!-- ========== LCP: preload logo ========== -->

    <!-- Tüm Google Fonts linkleri KALDIRILDI. Fontlar lokal olarak index.css'den yükleniyor. -->

    <!-- Minimal critical CSS — prevents FOUC before Tailwind loads -->
    <style>
      body {
        margin: 0;
        font-family: "Manrope", sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
