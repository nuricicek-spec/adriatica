<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Title ve meta description burada YOK — react-helmet-async her sayfada
      bunları data-rh="true" attribute'u ile inject eder. Statik bir fallback
      bırakmak duplicate tag sorununa yol açar (Bing ikisini de görür).
      Ancak Bingbot JavaScript render'da zayıf olduğu için, ona özel bir fallback ekliyoruz.
      Bu fallback sadece Bingbot tarafından görülecek, normal kullanıcılar/Google/Lighthouse
      React/Helmet çıktısını alacak. Böylece duplicate tag riski yok.
    -->

    <!-- Bingbot özel fallback (diğer kullanıcılar görmez) -->
    <script>
      (function() {
        // Sadece Bingbot ise statik title/description ekle
        if (navigator.userAgent.toLowerCase().includes('bingbot')) {
          // Title
          document.title = "Adriatica D.O.O. - Marine Engineering & Consultancy";
          // Meta description
          var meta = document.createElement('meta');
          meta.name = "description";
          meta.content = "Adriatica D.O.O. - Marine engineering consultancy: structural integrity, regulatory compliance and sustainable technologies. Serving Montenegro, Adriatic, Europe.";
          document.head.appendChild(meta);
        }
      })();
    </script>

    <meta name="author" content="Adriatica D.O.O." />
    <meta name="robots" content="index, follow" />
    <meta name="geo.region" content="ME" />
    <meta name="geo.placename" content="Montenegro" />
    <meta name="theme-color" content="#0B3B5C" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!--
      Font preload: @font-face ile tanımlı fontlar CSS parse edilene kadar
      discovered edilemez. crossorigin zorunlu — woff2 CORS gerektirir.
    -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/manrope.woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/cinzel.woff2"
      crossorigin="anonymous"
    />

    <!-- LCP görseli preload -->
    <link rel="preload" as="image" href="/logo.svg" fetchpriority="high" />

    <!--
      GTM defer: requestIdleCallback ile defer edilir;
      tarayıcı boşta iken yüklenir. Fallback: 3sn timeout (Safari).
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag("js", new Date());
      gtag("config", "G-WPWD3K7JHR", { send_page_view: false });

      function loadGtag() {
        var s = document.createElement("script");
        s.src = "https://www.googletagmanager.com/gtag/js?id=G-WPWD3K7JHR";
        s.async = true;
        document.head.appendChild(s);
      }

      if ("requestIdleCallback" in window) {
        requestIdleCallback(loadGtag, { timeout: 3000 });
      } else {
        setTimeout(loadGtag, 3000);
      }
    </script>

    <!-- Kritik stiller inline — FOUC'u engeller -->
    <style>
      body {
        margin: 0;
        font-family: "Manrope", sans-serif;
        background-color: hsl(40, 20%, 97%);
      }
      /* Skeleton — root boşken beyaz flash önlenir */
      #root:empty {
        min-height: 100dvh;
        background-color: hsl(40, 20%, 97%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
