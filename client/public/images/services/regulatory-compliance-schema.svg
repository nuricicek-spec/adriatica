    font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#D4AF37">UR Z10 · UR E</text>

  <!-- Dashed converge lines — all 6 bottom centres → y=268 -->
  <line x1="121" y1="204" x2="121" y2="268" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="360" y1="204" x2="360" y2="268" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="599" y1="204" x2="599" y2="268" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="121" y1="268" x2="599" y2="268" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="360" y1="268" x2="360" y2="292" stroke="#D4AF37" stroke-width="2" marker-end="url(#a)"/>

  <!-- YOUR VESSEL -->
  <rect x="240" y="300" width="240" height="60" rx="6" fill="#0B3B5C" filter="url(#s)"/>
  <text x="360" y="328" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700" fill="white">YOUR VESSEL</text>
  <text x="360" y="348" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.70)">All frameworks applied &amp; documented</text>

