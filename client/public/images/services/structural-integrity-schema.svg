<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" width="860" height="340">
  <defs>
    <filter id="s" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="rgba(11,59,92,0.16)"/>
    </filter>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#D4AF37" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Timeline track -->
  <rect x="60" y="166" width="750" height="7" rx="3.5" fill="#E2ECF3"/>
  <rect x="60" y="166" width="750" height="7" rx="3.5" fill="#3A74A0" opacity="0.35"/>

  <!-- Life extension dashed -->
  <line x1="724" y1="169" x2="810" y2="169" stroke="#D4AF37" stroke-width="2.5" stroke-dasharray="7,4"/>
  <polygon points="818,169 807,163 807,175" fill="#D4AF37"/>

  <!-- ═══ NODE 1: Yr 0 — ABOVE ═══ -->
  <circle cx="88"  cy="169" r="18" fill="#0B3B5C" filter="url(#s)"/>
  <circle cx="88"  cy="169" r="6"  fill="white"/>
  <line x1="88" y1="151" x2="88" y2="110" stroke="#3A74A0" stroke-width="1.4" stroke-dasharray="3,2"/>
  <text x="88" y="96" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#0B3B5C">Baseline Survey</text>
  <text x="88" y="112" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3A74A0">Initial condition</text>
  <text x="88" y="126" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3A74A0">established</text>
  <rect x="62" y="194" width="52" height="20" rx="10" fill="#0B3B5C"/>
  <text x="88" y="208" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="white">Yr 0</text>

  <!-- ═══ NODE 2: Yr 2.5 — BELOW ═══ -->
  <circle cx="238" cy="169" r="18" fill="#1A4B7A" filter="url(#s)"/>
  <circle cx="238" cy="169" r="6"  fill="white"/>
  <line x1="238" y1="187" x2="238" y2="228" stroke="#3A74A0" stroke-width="1.4" stroke-dasharray="3,2"/>
  <text x="238" y="244" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#0B3B5C">Intermediate Survey</text>
  <text x="238" y="260" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3A74A0">Hull &amp; coating check</text>
  <rect x="208" y="142" width="60" height="20" rx="10" fill="#1A4B7A"/>
  <text x="238" y="156" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="white">Yr 2.5</text>

  <!-- ═══ NODE 3: Yr 5 — ABOVE ═══ -->
  <circle cx="398" cy="169" r="18" fill="#2A5F8A" filter="url(#s)"/>
  <circle cx="398" cy="169" r="6"  fill="white"/>
  <line x1="398" y1="151" x2="398" y2="110" stroke="#3A74A0" stroke-width="1.4" stroke-dasharray="3,2"/>
  <text x="398" y="96" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#0B3B5C">Special Survey (1st)</text>
  <text x="398" y="112" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3A74A0">Class renewal,</text>
  <text x="398" y="126" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3A74A0">full inspection</text>
  <rect x="372" y="194" width="52" height="20" rx="10" fill="#2A5F8A"/>
  <text x="398" y="208" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="white">Yr 5</text>

  <!-- ═══ NODE 4: Yr 10 — BELOW ═══ -->
  <circle cx="568" cy="169" r="18" fill="#3A74A0" filter="url(#s)"/>
  <circle cx="568" cy="169" r="6"  fill="white"/>
  <line x1="568" y1="187" x2="568" y2="228" stroke="#3A74A0" stroke-width="1.4" stroke-dasharray="3,2"/>
  <text x="568" y="244" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#0B3B5C">Special Survey (2nd)</text>
  <text x="568" y="260" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3A74A0">Structural assessment</text>
  <text x="568" y="274" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3A74A0">&amp; repair scope</text>
  <rect x="538" y="142" width="60" height="20" rx="10" fill="#3A74A0"/>
  <text x="568" y="156" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="white">Yr 10</text>

  <!-- ═══ NODE 5: Yr 15+ — ABOVE — GOLD ═══ -->
  <circle cx="724" cy="169" r="24" fill="#D4AF37" filter="url(#g)"/>
  <circle cx="724" cy="169" r="9"  fill="white"/>
  <line x1="724" y1="145" x2="724" y2="104" stroke="#D4AF37" stroke-width="1.8" stroke-dasharray="4,3"/>
  <text x="724" y="90" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#0B3B5C">Life Extension Study</text>
  <text x="724" y="106" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3A74A0">Integrity analysis,</text>
  <text x="724" y="120" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3A74A0">class acceptance</text>
  <rect x="692" y="200" width="64" height="20" rx="10" fill="#D4AF37"/>
  <text x="724" y="214" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#0B3B5C">Yr 15+</text>

  <!-- IACS bar -->
  <rect x="60" y="298" width="750" height="30" rx="4" fill="#0B3B5C" opacity="0.05"/>
  <text x="435" y="318" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600"
    fill="#0B3B5C" letter-spacing="1.5">IACS UR Z10 ALIGNED · CLASSIFICATION SOCIETY ACCEPTED</text>

</svg>
