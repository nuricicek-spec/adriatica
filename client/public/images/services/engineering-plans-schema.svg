<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" width="720" height="560">
  <defs>
    <filter id="s" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="rgba(11,59,92,0.14)"/>
    </filter>
  </defs>

  <!-- ── Layer 1: Structural Drawings ── -->
  <rect x="60" y="20" width="600" height="90" rx="6" fill="#0B3B5C" filter="url(#s)"/>
  <!-- Ruler icon -->
  <g transform="translate(86,42)" stroke="white" stroke-width="1.8" fill="none">
    <rect x="0" y="0" width="32" height="12" rx="2"/>
    <line x1="6"  y1="0" x2="6"  y2="6"/>
    <line x1="12" y1="0" x2="12" y2="4"/>
    <line x1="18" y1="0" x2="18" y2="6"/>
    <line x1="24" y1="0" x2="24" y2="4"/>
  </g>
  <!-- Step badge -->
  <rect x="86" y="58" width="24" height="24" rx="4" fill="#D4AF37"/>
  <text x="98" y="75" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#0B3B5C">1</text>
  <text x="128" y="48"
    font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700" fill="white">Structural Drawings</text>
  <text x="128" y="67"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.78)">Hull frames, plates, bulkheads · class society rules &amp; IACS requirements</text>
  <text x="128" y="86"
    font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#D4AF37">RINA · BV · DNV · Flag State</text>

  <!-- Arrow -->
  <line x1="360" y1="110" x2="360" y2="134" stroke="#D4AF37" stroke-width="2"/>
  <polygon points="360,140 354,128 366,128" fill="#D4AF37"/>

  <!-- ── Layer 2: As-Built Drawing Sets ── -->
  <rect x="90" y="144" width="540" height="90" rx="6" fill="#1A4B7A" filter="url(#s)"/>
  <g transform="translate(116,162)" stroke="white" stroke-width="1.8" fill="none">
    <circle cx="14" cy="14" r="6"/>
    <circle cx="14" cy="14" r="2" fill="white" stroke="none"/>
    <line x1="14" y1="3"  x2="14" y2="6"/>
    <line x1="14" y1="22" x2="14" y2="25"/>
    <line x1="3"  y1="14" x2="6"  y2="14"/>
    <line x1="22" y1="14" x2="25" y2="14"/>
    <line x1="6"  y1="6"  x2="8"  y2="8"/>
    <line x1="20" y1="20" x2="22" y2="22"/>
    <line x1="22" y1="6"  x2="20" y2="8"/>
    <line x1="8"  y1="20" x2="6"  y2="22"/>
  </g>
  <rect x="116" y="178" width="24" height="24" rx="4" fill="#D4AF37"/>
  <text x="128" y="195" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#0B3B5C">2</text>
  <text x="158" y="172"
    font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700" fill="white">As‑Built Drawing Sets</text>
  <text x="158" y="191"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.78)">Post-construction documentation reflecting actual built condition</text>
  <text x="158" y="210"
    font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#D4AF37">Class records · IMO compliance · As-built submission</text>

  <!-- Arrow -->
  <line x1="360" y1="234" x2="360" y2="258" stroke="#D4AF37" stroke-width="2"/>
  <polygon points="360,264 354,252 366,252" fill="#D4AF37"/>

  <!-- ── Layer 3: Arrangement Plans ── -->
  <rect x="120" y="268" width="480" height="90" rx="6" fill="#2A5F8A" filter="url(#s)"/>
  <g transform="translate(146,286)" stroke="white" stroke-width="1.8" fill="none">
    <rect x="0" y="0" width="26" height="26" rx="2"/>
    <line x1="0" y1="9"  x2="26" y2="9"/>
    <line x1="0" y1="17" x2="26" y2="17"/>
    <line x1="9" y1="0"  x2="9"  y2="26"/>
    <line x1="17" y1="0" x2="17" y2="26"/>
  </g>
  <rect x="146" y="302" width="24" height="24" rx="4" fill="#D4AF37"/>
  <text x="158" y="319" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#0B3B5C">3</text>
  <text x="188" y="296"
    font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700" fill="white">Arrangement Plans</text>
  <text x="188" y="315"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.78)">General arrangement, deck layouts, compartment allocation</text>
  <text x="188" y="334"
    font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#D4AF37">GA Plan · Deck plans · Compartment layouts</text>

  <!-- Arrow -->
  <line x1="360" y1="358" x2="360" y2="382" stroke="#D4AF37" stroke-width="2"/>
  <polygon points="360,388 354,376 366,376" fill="#D4AF37"/>

  <!-- ── Layer 4: Fire & Safety Plans ── -->
  <rect x="150" y="392" width="420" height="90" rx="6" fill="#3A74A0" filter="url(#s)"/>
  <g transform="translate(176,408)" stroke="white" stroke-width="1.8" fill="none">
    <path d="M13,28 C4,24 2,15 7,10 C7,15 10,17 12,13 C12,20 17,18 17,12 C21,15 22,22 17,28 Z"/>
  </g>
  <rect x="176" y="424" width="24" height="24" rx="4" fill="#D4AF37"/>
  <text x="188" y="441" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#0B3B5C">4</text>
  <text x="218" y="420"
    font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700" fill="white">Fire &amp; Safety Plans</text>
  <text x="218" y="439"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.78)">Firefighting systems, escape routes, SOLAS compliance</text>
  <text x="218" y="458"
    font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#D4AF37">SOLAS · FSS Code · Flag State requirements</text>

  <!-- Arrow -->
  <line x1="360" y1="482" x2="360" y2="500" stroke="#D4AF37" stroke-width="2"/>
  <polygon points="360,506 354,494 366,494" fill="#D4AF37"/>

  <!-- ── CLASS APPROVAL READY Badge ── -->
  <rect x="180" y="510" width="360" height="44" rx="22" fill="#D4AF37" filter="url(#s)"/>
  <g transform="translate(204,524)" stroke="#0B3B5C" stroke-width="2.5" fill="none"
    stroke-linecap="round" stroke-linejoin="round">
    <polyline points="0,9 5,16 16,3"/>
  </g>
  <text x="370" y="537" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700"
    fill="#0B3B5C" letter-spacing="1.5">CLASS APPROVAL READY</text>

</svg>
