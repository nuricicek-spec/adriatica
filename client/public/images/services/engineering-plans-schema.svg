<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(11,59,92,0.18)"/>
    </filter>
    <!-- Blueprint grid pattern -->
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#3A74A0" stroke-width="0.4" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Background grid -->
  <rect width="800" height="700" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="44" text-anchor="middle" font-family="Arial,Helvetica,sans-serif"
    font-size="22" font-weight="700" fill="#0B3B5C" letter-spacing="1">
    ENGINEERING PLANS
  </text>
  <text x="400" y="66" text-anchor="middle" font-family="Arial,Helvetica,sans-serif"
    font-size="12" fill="#3A74A0" letter-spacing="2">
    DELIVERABLE HIERARCHY
  </text>

  <!-- ── Layer 1: Structural Drawings ── -->
  <rect x="100" y="90" width="600" height="100" rx="8"
    fill="#0B3B5C" filter="url(#shadow1)"/>
  <!-- Ruler icon -->
  <g transform="translate(132,118)" stroke="white" stroke-width="2" fill="none">
    <rect x="0" y="0" width="36" height="14" rx="2"/>
    <line x1="6"  y1="0" x2="6"  y2="7"/>
    <line x1="12" y1="0" x2="12" y2="5"/>
    <line x1="18" y1="0" x2="18" y2="7"/>
    <line x1="24" y1="0" x2="24" y2="5"/>
    <line x1="30" y1="0" x2="30" y2="7"/>
  </g>
  <text x="194" y="133" font-family="Arial,Helvetica,sans-serif"
    font-size="16" font-weight="700" fill="white">Structural Drawings</text>
  <text x="194" y="153" font-family="Arial,Helvetica,sans-serif"
    font-size="12" fill="rgba(255,255,255,0.72)">
    Hull frames, plates, bulkheads — per class society rules &amp; IACS requirements
  </text>
  <text x="668" y="146" font-family="Arial,Helvetica,sans-serif"
    font-size="11" font-weight="600" fill="#D4AF37" text-anchor="end">01</text>

  <!-- Arrow 1→2 -->
  <line x1="400" y1="190" x2="400" y2="218" stroke="#D4AF37" stroke-width="2.5"/>
  <polygon points="400,224 394,212 406,212" fill="#D4AF37"/>

  <!-- ── Layer 2: As-Built Drawing Sets ── -->
  <rect x="130" y="228" width="540" height="100" rx="8"
    fill="#1A4B7A" filter="url(#shadow1)"/>
  <!-- Gear icon -->
  <g transform="translate(164,252)" stroke="white" stroke-width="2" fill="none">
    <circle cx="18" cy="18" r="7"/>
    <circle cx="18" cy="18" r="2.5" fill="white" stroke="none"/>
    <line x1="18" y1="4"  x2="18" y2="8"/>
    <line x1="18" y1="28" x2="18" y2="32"/>
    <line x1="4"  y1="18" x2="8"  y2="18"/>
    <line x1="28" y1="18" x2="32" y2="18"/>
    <line x1="8"  y1="8"  x2="11" y2="11"/>
    <line x1="25" y1="25" x2="28" y2="28"/>
    <line x1="28" y1="8"  x2="25" y2="11"/>
    <line x1="11" y1="25" x2="8"  y2="28"/>
  </g>
  <text x="220" y="272" font-family="Arial,Helvetica,sans-serif"
    font-size="16" font-weight="700" fill="white">As‑Built Drawing Sets</text>
  <text x="220" y="292" font-family="Arial,Helvetica,sans-serif"
    font-size="12" fill="rgba(255,255,255,0.72)">
    Post-construction documentation reflecting actual built condition
  </text>
  <text x="646" y="284" font-family="Arial,Helvetica,sans-serif"
    font-size="11" font-weight="600" fill="#D4AF37" text-anchor="end">02</text>

  <!-- Arrow 2→3 -->
  <line x1="400" y1="328" x2="400" y2="356" stroke="#D4AF37" stroke-width="2.5"/>
  <polygon points="400,362 394,350 406,350" fill="#D4AF37"/>

  <!-- ── Layer 3: Arrangement Plans ── -->
  <rect x="160" y="366" width="480" height="100" rx="8"
    fill="#2A5F8A" filter="url(#shadow1)"/>
  <!-- Blueprint/grid icon -->
  <g transform="translate(192,390)" stroke="white" stroke-width="2" fill="none">
    <rect x="0" y="0" width="30" height="30" rx="2"/>
    <line x1="0" y1="10" x2="30" y2="10"/>
    <line x1="0" y1="20" x2="30" y2="20"/>
    <line x1="10" y1="0" x2="10" y2="30"/>
    <line x1="20" y1="0" x2="20" y2="30"/>
  </g>
  <text x="244" y="410" font-family="Arial,Helvetica,sans-serif"
    font-size="16" font-weight="700" fill="white">Arrangement Plans</text>
  <text x="244" y="430" font-family="Arial,Helvetica,sans-serif"
    font-size="12" fill="rgba(255,255,255,0.72)">
    General arrangement, deck layouts, compartment allocation
  </text>
  <text x="616" y="422" font-family="Arial,Helvetica,sans-serif"
    font-size="11" font-weight="600" fill="#D4AF37" text-anchor="end">03</text>

  <!-- Arrow 3→4 -->
  <line x1="400" y1="466" x2="400" y2="494" stroke="#D4AF37" stroke-width="2.5"/>
  <polygon points="400,500 394,488 406,488" fill="#D4AF37"/>

  <!-- ── Layer 4: Fire & Safety Plans ── -->
  <rect x="190" y="504" width="420" height="100" rx="8"
    fill="#3A74A0" filter="url(#shadow1)"/>
  <!-- Flame icon -->
  <g transform="translate(220,522)" stroke="white" stroke-width="2" fill="none">
    <path d="M16,32 C4,28 2,18 8,12 C8,18 12,20 14,16 C14,24 20,22 20,14 C24,18 26,26 20,32 Z"/>
    <circle cx="16" cy="26" r="3" fill="none"/>
  </g>
  <text x="268" y="548" font-family="Arial,Helvetica,sans-serif"
    font-size="16" font-weight="700" fill="white">Fire &amp; Safety Plans</text>
  <text x="268" y="568" font-family="Arial,Helvetica,sans-serif"
    font-size="12" fill="rgba(255,255,255,0.72)">
    Firefighting systems, escape routes, SOLAS compliance
  </text>
  <text x="586" y="560" font-family="Arial,Helvetica,sans-serif"
    font-size="11" font-weight="600" fill="#D4AF37" text-anchor="end">04</text>

  <!-- Arrow 4→Badge -->
  <line x1="400" y1="604" x2="400" y2="624" stroke="#D4AF37" stroke-width="2.5"/>
  <polygon points="400,630 394,618 406,618" fill="#D4AF37"/>

  <!-- ── CLASS APPROVAL READY Badge ── -->
  <rect x="220" y="634" width="360" height="52" rx="26"
    fill="#D4AF37" filter="url(#shadow1)"/>
  <!-- Checkmark -->
  <g transform="translate(242,650)" stroke="#0B3B5C" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="0,10 6,18 18,4"/>
  </g>
  <text x="400" y="667" text-anchor="middle" font-family="Arial,Helvetica,sans-serif"
    font-size="15" font-weight="700" fill="#0B3B5C" letter-spacing="1.5">
    CLASS APPROVAL READY
  </text>

</svg>
