<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 660" width="720" height="660">
  <defs>
    <filter id="s" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(11,59,92,0.16)"/>
    </filter>
  </defs>

  <!-- Vertical guide line -->
  <line x1="88" y1="20" x2="88" y2="556"
    stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- ═══ PHASE 1 ═══ -->
  <rect x="36" y="20" width="648" height="112" rx="8" fill="#0B3B5C" filter="url(#s)"/>
  <circle cx="88" cy="76" r="28" fill="#D4AF37"/>
  <text x="88" y="83" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700" fill="#0B3B5C">1</text>
  <!-- Clipboard icon -->
  <g transform="translate(132,44)" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round">
    <rect x="2" y="6" width="22" height="28" rx="2"/>
    <rect x="7" y="0" width="12" height="9"  rx="2"/>
    <line x1="6" y1="16" x2="20" y2="16"/>
    <line x1="6" y1="22" x2="20" y2="22"/>
    <line x1="6" y1="28" x2="14" y2="28"/>
  </g>
  <text x="172" y="55"
    font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700" fill="white">Brief &amp; Information</text>
  <text x="172" y="74"
    font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(255,255,255,0.78)">Share vessel details, operational profile and specific project requirements</text>
  <text x="172" y="92"
    font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(255,255,255,0.78)">with our engineers — remote or on-site kickoff available</text>
  <text x="172" y="112"
    font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#D4AF37">Kickoff · Vessel Survey · Scope Definition</text>

  <!-- Chevron -->
  <polygon points="360,142 332,154 360,166 388,154" fill="#D4AF37" opacity="0.88"/>

  <!-- ═══ PHASE 2 ═══ -->
  <rect x="36" y="172" width="648" height="112" rx="8" fill="#1A4B7A" filter="url(#s)"/>
  <circle cx="88" cy="228" r="28" fill="#D4AF37"/>
  <text x="88" y="235" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700" fill="#0B3B5C">2</text>
  <!-- Calendar icon -->
  <g transform="translate(132,196)" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round">
    <rect x="0" y="4" width="26" height="26" rx="2"/>
    <line x1="0"  y1="12" x2="26" y2="12"/>
    <line x1="7"  y1="0"  x2="7"  y2="8"/>
    <line x1="19" y1="0"  x2="19" y2="8"/>
    <line x1="5"  y1="19" x2="9"  y2="19"/>
    <line x1="12" y1="19" x2="16" y2="19"/>
    <line x1="19" y1="19" x2="23" y2="19"/>
  </g>
  <text x="172" y="207"
    font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700" fill="white">Planning &amp; Specification</text>
  <text x="172" y="226"
    font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(255,255,255,0.78)">Technical assessment, risk identification, work specification,</text>
  <text x="172" y="244"
    font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(255,255,255,0.78)">budget preparation, contractor selection, schedule planning</text>
  <text x="172" y="264"
    font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#D4AF37">Risk Matrix · Work Spec · Budget Control</text>

  <!-- Chevron -->
  <polygon points="360,294 332,306 360,318 388,306" fill="#D4AF37" opacity="0.88"/>

  <!-- ═══ PHASE 3 ═══ -->
  <rect x="36" y="324" width="648" height="112" rx="8" fill="#2A5F8A" filter="url(#s)"/>
  <circle cx="88" cy="380" r="28" fill="#D4AF37"/>
  <text x="88" y="387" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700" fill="#0B3B5C">3</text>
  <!-- Wrench icon -->
  <g transform="translate(132,348)" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round">
    <path d="M22,2 C22,2 16,4 14,10 C12,15 14,19 14,19 L4,30 C2,32 2,36 4,37 C6,39 9,38 11,36 L21,25 C21,25 24,27 29,25 C35,23 37,17 37,17 L30,15 L29,12 L32,8 C32,8 28,2 22,2Z"/>
  </g>
  <text x="172" y="359"
    font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700" fill="white">Execution &amp; Supervision</text>
  <text x="172" y="378"
    font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(255,255,255,0.78)">On-site engineering oversight, contractor coordination,</text>
  <text x="172" y="396"
    font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(255,255,255,0.78)">real-time quality control and non-conformity management</text>
  <text x="172" y="416"
    font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#D4AF37">Owner's Rep · Shipyard Liaison · QC Sign-Off</text>

  <!-- Chevron -->
  <polygon points="360,446 332,458 360,470 388,458" fill="#D4AF37" opacity="0.88"/>

  <!-- ═══ PHASE 4 ═══ -->
  <rect x="36" y="476" width="648" height="80" rx="8" fill="#3A74A0" filter="url(#s)"/>
  <circle cx="88" cy="516" r="28" fill="#D4AF37"/>
  <text x="88" y="523" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700" fill="#0B3B5C">4</text>
  <!-- File icon -->
  <g transform="translate(132,490)" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round">
    <rect x="2" y="0" width="24" height="32" rx="2"/>
    <polyline points="16,0 16,9 26,9"/>
    <line x1="6" y1="15" x2="20" y2="15"/>
    <line x1="6" y1="21" x2="20" y2="21"/>
    <line x1="6" y1="27" x2="13" y2="27"/>
  </g>
  <text x="172" y="507"
    font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700" fill="white">Documentation &amp; Handover</text>
  <text x="172" y="526"
    font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(255,255,255,0.78)">Class-ready records, as-built documentation, full audit trail</text>
  <text x="172" y="546"
    font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#D4AF37">As-Built Docs · Class Submission · PSC Package</text>

  <!-- OUTCOME ribbon -->
  <rect x="96" y="578" width="528" height="42" rx="21" fill="#D4AF37" filter="url(#s)"/>
  <!-- Trophy icon -->
  <g transform="translate(114,588)" stroke="#0B3B5C" stroke-width="1.8" fill="none" stroke-linecap="round">
    <path d="M9,0 L9,13 C9,18 14,22 14,22 C14,22 19,18 19,13 L19,0 Z"/>
    <line x1="7"  y1="24" x2="21" y2="24"/>
    <line x1="14" y1="22" x2="14" y2="24"/>
    <line x1="3"  y1="0"  x2="9"  y2="0"/>
    <line x1="19" y1="0"  x2="25" y2="0"/>
    <path d="M3,0 C1,0 0,3 0,7 C0,11 3,13 9,11"/>
    <path d="M25,0 C27,0 28,3 28,7 C28,11 25,13 19,11"/>
  </g>
  <text x="360" y="604" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700"
    fill="#0B3B5C" letter-spacing="1">ON-TIME · ON-BUDGET DELIVERY</text>

</svg>
