    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">diagrams, IMO standards</text>
  <text x="116" y="228" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#D4AF37">EU MRV · MARPOL</text>

  <!-- ── BLOCK 2: EAB ── -->
  <rect x="268" y="128" width="184" height="110" rx="6" fill="#2A5F8A" filter="url(#s)"/>
  <g transform="translate(282,140)" stroke="white" stroke-width="1.6" fill="none">
    <rect x="6" y="6" width="14" height="12" rx="2"/>
    <line x1="0"  y1="12" x2="6"  y2="12"/>
    <line x1="20" y1="12" x2="26" y2="12"/>
    <line x1="0"  y1="9"  x2="0"  y2="15"/>
    <line x1="26" y1="9"  x2="26" y2="15"/>
    <line x1="13" y1="0"  x2="13" y2="6"/>
    <line x1="13" y1="18" x2="13" y2="24"/>
    <line x1="10" y1="24" x2="16" y2="24"/>
  </g>
  <text x="360" y="154" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="white">Electrical Load</text>
  <text x="360" y="172" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="white">Analysis (EAB)</text>
  <text x="360" y="192" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">Power balance, load groups,</text>
  <text x="360" y="208" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">emergency supply verification</text>
  <text x="360" y="228" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#D4AF37">SOLAS · Class Rules</text>

  <!-- ── BLOCK 3: Fuel ── -->
  <rect x="512" y="128" width="184" height="110" rx="6" fill="#3A74A0" filter="url(#s)"/>
  <g transform="translate(526,140)" stroke="white" stroke-width="1.6" fill="none">
    <path d="M14,4 C14,4 5,16 5,21 A9,9 0 0,0 23,21 C23,16 14,4 14,4Z"/>
    <line x1="8" y1="21" x2="11" y2="18"/>
  </g>
  <text x="604" y="154" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="white">Fuel Management</text>
  <text x="604" y="172" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="white">&amp; Quality Booklet</text>
  <text x="604" y="192" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">Bunkering procedures,</text>
  <text x="604" y="208" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">quality control &amp; IHM</text>
  <text x="604" y="228" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#D4AF37">EU MRV · IMO DCS</text>

  <!-- Converge lines -->
  <line x1="116" y1="238" x2="116" y2="272" stroke="#D4AF37" stroke-width="1.8"/>
  <line x1="116" y1="272" x2="348" y2="272" stroke="#D4AF37" stroke-width="1.8"/>
  <line x1="360" y1="238" x2="360" y2="272" stroke="#D4AF37" stroke-width="1.8"/>
  <line x1="604" y1="238" x2="604" y2="272" stroke="#D4AF37" stroke-width="1.8"/>
  <line x1="604" y1="272" x2="372" y2="272" stroke="#D4AF37" stroke-width="1.8"/>
  <line x1="360" y1="272" x2="360" y2="294" stroke="#D4AF37" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- ── IHM / Class Submission ── -->
  <rect x="172" y="302" width="376" height="72" rx="6" fill="#D4AF37" filter="url(#s)"/>
  <text x="360" y="334" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700" fill="#0B3B5C">IHM / Class Submission</text>
  <text x="360" y="356" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#0B3B5C" opacity="0.85">
    Inventory of Hazardous Materials · Flag State · PSC
  </text>

  <!-- Outcome text -->
  <text x="360" y="412" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#3A74A0" font-style="italic">
