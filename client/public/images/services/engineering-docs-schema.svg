  </text>

  <!-- Bottom rule -->
  <line x1="60" y1="430" x2="660" y2="430" stroke="#E2ECF3" stroke-width="1"/>
  <text x="360" y="452" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#3A74A0"
    letter-spacing="2" opacity="0.6">ADRIATICA D.O.O. · ENGINEERING DOCUMENTATION</text>

</svg>
