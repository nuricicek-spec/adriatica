  <!-- ── TOP: Vessel Data ── -->
  <rect x="256" y="14" width="208" height="64" rx="6" fill="#0B3B5C" filter="url(#s)"/>
  <g transform="translate(280,22)" stroke="white" stroke-width="1.6" fill="none">
    <ellipse cx="16" cy="6"  rx="16" ry="6"/>
    <ellipse cx="16" cy="22" rx="16" ry="6"/>
    <line x1="0"  y1="6"  x2="0"  y2="22"/>
    <line x1="32" y1="6"  x2="32" y2="22"/>
    <path d="M0,14 Q16,20 32,14"/>
  </g>
  <text x="360" y="54" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="white">Vessel Data</text>
  <text x="360" y="70" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.72)">Drawings · Specs · History</text>

  <!-- Branch lines -->
  <line x1="360" y1="78" x2="360" y2="100" stroke="#D4AF37" stroke-width="1.8"/>
  <line x1="116" y1="100" x2="604" y2="100" stroke="#D4AF37" stroke-width="1.8"/>
  <line x1="116" y1="100" x2="116" y2="120" stroke="#D4AF37" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="360" y1="100" x2="360" y2="120" stroke="#D4AF37" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="604" y1="100" x2="604" y2="120" stroke="#D4AF37" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- ── BLOCK 1: P&ID ── -->
  <rect x="24"  y="128" width="184" height="110" rx="6" fill="#1A4B7A" filter="url(#s)"/>
  <g transform="translate(38,140)" stroke="white" stroke-width="1.6" fill="none">
    <rect x="0" y="0" width="20" height="26" rx="2"/>
    <line x1="3" y1="8"  x2="17" y2="8"/>
    <line x1="3" y1="13" x2="17" y2="13"/>
    <line x1="3" y1="18" x2="11" y2="18"/>
    <polyline points="13,0 13,7 20,7"/>
  </g>
  <text x="116" y="154" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="white">As-Built P&amp;ID</text>
  <text x="116" y="172" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="white">System Manuals</text>
  <text x="116" y="192" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">Piping &amp; instrumentation</text>
