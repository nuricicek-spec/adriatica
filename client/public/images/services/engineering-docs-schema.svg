  </defs>

  <!-- AUDIT READY badge -->
  <rect x="570" y="10" width="136" height="32" rx="16" fill="#D4AF37" filter="url(#s)"/>
  <text x="638" y="31" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700"
